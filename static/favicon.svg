<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Cable cross-section favicon for SodhiCable MES -->
  <circle cx="16" cy="16" r="15" fill="#0f172a" stroke="#3b82f6" stroke-width="1.5"/>
  <!-- Outer jacket -->
  <circle cx="16" cy="16" r="11" fill="none" stroke="#64748b" stroke-width="2"/>
  <!-- Shield braid -->
  <circle cx="16" cy="16" r="8.5" fill="none" stroke="#f59e0b" stroke-width="0.8" stroke-dasharray="2,1.5"/>
  <!-- Three conductors (instrumentation cable) -->
  <circle cx="12" cy="13" r="2.5" fill="#ef4444" stroke="#dc2626" stroke-width="0.5"/>
  <circle cx="20" cy="13" r="2.5" fill="#3b82f6" stroke="#2563eb" stroke-width="0.5"/>
  <circle cx="16" cy="19.5" r="2.5" fill="#22c55e" stroke="#16a34a" stroke-width="0.5"/>
  <!-- Copper conductors inside -->
  <circle cx="12" cy="13" r="1" fill="#d97706"/>
  <circle cx="20" cy="13" r="1" fill="#d97706"/>
  <circle cx="16" cy="19.5" r="1" fill="#d97706"/>
</svg>
